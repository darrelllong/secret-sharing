<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img">
  <title>Visual cryptography (3, 3): latency vs image area</title>
  <style>
    .bg { fill: #fbf8f1; }
    .grid { stroke: #c9c2b7; stroke-width: 1; fill: none; }
    .axis { stroke: #6b6257; stroke-width: 1.5; fill: none; }
    .label { fill: #342f29; font: 11px ui-sans-serif, -apple-system, sans-serif; }
    .small { fill: #6b6257; font: 10px ui-sans-serif, -apple-system, sans-serif; }
    .title { fill: #342f29; font: bold 13px ui-sans-serif, -apple-system, sans-serif; }
  </style>
  <rect class="bg" x="0" y="0" width="640" height="420" rx="12" />
  <line class="axis" x1="80.0" y1="330.0" x2="610.0" y2="330.0" />
  <line class="axis" x1="80.0" y1="60.0" x2="80.0" y2="330.0" />
  <line class="grid" x1="80.0" y1="330.0" x2="610.0" y2="330.0" />
  <text class="small" x="74.0" y="333.0" text-anchor="end">100 ns</text>
  <line class="grid" x1="80.0" y1="262.5" x2="610.0" y2="262.5" />
  <text class="small" x="74.0" y="265.5" text-anchor="end">1.0 µs</text>
  <line class="grid" x1="80.0" y1="195.0" x2="610.0" y2="195.0" />
  <text class="small" x="74.0" y="198.0" text-anchor="end">10.0 µs</text>
  <line class="grid" x1="80.0" y1="127.5" x2="610.0" y2="127.5" />
  <text class="small" x="74.0" y="130.5" text-anchor="end">100.0 µs</text>
  <line class="grid" x1="80.0" y1="60.0" x2="610.0" y2="60.0" />
  <text class="small" x="74.0" y="63.0" text-anchor="end">1.00 ms</text>
  <line class="grid" x1="80.0" y1="60.0" x2="80.0" y2="330.0" />
  <text class="small" x="80.0" y="344.0" text-anchor="middle">4×4</text>
  <line class="grid" x1="86.2" y1="60.0" x2="86.2" y2="330.0" />
  <text class="small" x="86.2" y="344.0" text-anchor="middle">8×8</text>
  <line class="grid" x1="111.2" y1="60.0" x2="111.2" y2="330.0" />
  <text class="small" x="111.2" y="344.0" text-anchor="middle">16×16</text>
  <line class="grid" x1="210.9" y1="60.0" x2="210.9" y2="330.0" />
  <text class="small" x="210.9" y="344.0" text-anchor="middle">32×32</text>
  <line class="grid" x1="610.0" y1="60.0" x2="610.0" y2="330.0" />
  <text class="small" x="610.0" y="344.0" text-anchor="middle">64×64</text>
  <path d="M 80.0 249.8 L 86.2 213.7 L 111.2 174.4 L 210.9 134.3 L 610.0 93.7" stroke="#0f766e" stroke-width="2" fill="none" />
  <circle cx="80.0" cy="249.8" r="3.5" fill="#0f766e" />
  <circle cx="86.2" cy="213.7" r="3.5" fill="#0f766e" />
  <circle cx="111.2" cy="174.4" r="3.5" fill="#0f766e" />
  <circle cx="210.9" cy="134.3" r="3.5" fill="#0f766e" />
  <circle cx="610.0" cy="93.7" r="3.5" fill="#0f766e" />
  <path d="M 80.0 303.1 L 86.2 269.4 L 111.2 235.2 L 210.9 194.9 L 610.0 154.7" stroke="#1d4ed8" stroke-width="2" fill="none" />
  <circle cx="80.0" cy="303.1" r="3.5" fill="#1d4ed8" />
  <circle cx="86.2" cy="269.4" r="3.5" fill="#1d4ed8" />
  <circle cx="111.2" cy="235.2" r="3.5" fill="#1d4ed8" />
  <circle cx="210.9" cy="194.9" r="3.5" fill="#1d4ed8" />
  <circle cx="610.0" cy="154.7" r="3.5" fill="#1d4ed8" />
  <text class="title" x="80.0" y="30.0">Visual cryptography (3, 3): latency vs image area</text>
  <text class="small" x="80.0" y="46.0">fixed n=3; image scales W×H from 4×4 to 64×64</text>
  <text class="small" x="345.0" y="362.0" text-anchor="middle">image area (pixels, label = side×side)</text>
  <text class="small" x="20" y="195.0" transform="rotate(-90 20 195.0)" text-anchor="middle">latency (log scale)</text>
  <rect x="80.0" y="398.0" width="12" height="12" fill="#0f766e" rx="2" />
  <text class="small" x="98.0" y="408.0">split</text>
  <rect x="148.0" y="398.0" width="12" height="12" fill="#1d4ed8" rx="2" />
  <text class="small" x="166.0" y="408.0">reconstruct</text>
</svg>
