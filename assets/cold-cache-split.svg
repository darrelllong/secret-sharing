<svg xmlns="http://www.w3.org/2000/svg" width="640" height="370" viewBox="0 0 640 370" role="img">
  <title>Cold-cache vs warm median (split, 128-bit field)</title>
  <style>
    .bg { fill: #fbf8f1; }
    .grid { stroke: #c9c2b7; stroke-width: 1; }
    .label { fill: #342f29; font: 11px ui-sans-serif, -apple-system, sans-serif; }
    .small { fill: #6b6257; font: 10px ui-sans-serif, -apple-system, sans-serif; }
    .title { fill: #342f29; font: bold 13px ui-sans-serif, -apple-system, sans-serif; }
  </style>
  <rect class="bg" x="0" y="0" width="640" height="370" rx="12" />
  <text class="title" x="20" y="30">Cold-cache vs warm median (split, 128-bit field)</text>
  <text class="small" x="20" y="46">First-iteration latency in red, 200-iteration warm median in teal; log x-axis</text>
  <line class="grid" x1="130.0" y1="60.0" x2="130.0" y2="304.0" />
  <text class="small" x="130.0" y="318.0" text-anchor="middle">100 ns</text>
  <line class="grid" x1="247.5" y1="60.0" x2="247.5" y2="304.0" />
  <text class="small" x="247.5" y="318.0" text-anchor="middle">1.0 µs</text>
  <line class="grid" x1="365.0" y1="60.0" x2="365.0" y2="304.0" />
  <text class="small" x="365.0" y="318.0" text-anchor="middle">10.0 µs</text>
  <line class="grid" x1="482.5" y1="60.0" x2="482.5" y2="304.0" />
  <text class="small" x="482.5" y="318.0" text-anchor="middle">100.0 µs</text>
  <line class="grid" x1="600.0" y1="60.0" x2="600.0" y2="304.0" />
  <text class="small" x="600.0" y="318.0" text-anchor="middle">1.00 ms</text>
  <text class="label" x="122.0" y="76.0" text-anchor="end">shamir</text>
  <rect x="130.0" y="60.0" width="192.3" height="11.0" fill="#b91c1c" rx="2" />
  <rect x="130.0" y="72.0" width="171.4" height="11.0" fill="#0f766e" rx="2" />
  <text class="small" x="330.3" y="76.0">cold/warm = 1.5×</text>
  <text class="label" x="122.0" y="106.0" text-anchor="end">blakley</text>
  <rect x="130.0" y="90.0" width="374.2" height="11.0" fill="#b91c1c" rx="2" />
  <rect x="130.0" y="102.0" width="373.9" height="11.0" fill="#0f766e" rx="2" />
  <text class="small" x="512.2" y="106.0">cold/warm = 1.0×</text>
  <text class="label" x="122.0" y="136.0" text-anchor="end">kothari</text>
  <rect x="130.0" y="120.0" width="173.6" height="11.0" fill="#b91c1c" rx="2" />
  <rect x="130.0" y="132.0" width="165.9" height="11.0" fill="#0f766e" rx="2" />
  <text class="small" x="311.6" y="136.0">cold/warm = 1.2×</text>
  <text class="label" x="122.0" y="166.0" text-anchor="end">ramp</text>
  <rect x="130.0" y="150.0" width="290.6" height="11.0" fill="#b91c1c" rx="2" />
  <rect x="130.0" y="162.0" width="293.7" height="11.0" fill="#0f766e" rx="2" />
  <text class="small" x="428.6" y="166.0">cold/warm = 0.9×</text>
  <text class="label" x="122.0" y="196.0" text-anchor="end">vss</text>
  <rect x="130.0" y="180.0" width="262.8" height="11.0" fill="#b91c1c" rx="2" />
  <rect x="130.0" y="192.0" width="257.8" height="11.0" fill="#0f766e" rx="2" />
  <text class="small" x="400.8" y="196.0">cold/warm = 1.1×</text>
  <text class="label" x="122.0" y="226.0" text-anchor="end">bytes</text>
  <rect x="130.0" y="210.0" width="211.0" height="11.0" fill="#b91c1c" rx="2" />
  <rect x="130.0" y="222.0" width="202.9" height="11.0" fill="#0f766e" rx="2" />
  <text class="small" x="349.0" y="226.0">cold/warm = 1.2×</text>
  <text class="label" x="122.0" y="256.0" text-anchor="end">ida</text>
  <rect x="130.0" y="240.0" width="178.9" height="11.0" fill="#b91c1c" rx="2" />
  <rect x="130.0" y="252.0" width="161.6" height="11.0" fill="#0f766e" rx="2" />
  <text class="small" x="316.9" y="256.0">cold/warm = 1.4×</text>
  <text class="label" x="122.0" y="286.0" text-anchor="end">trivial</text>
  <rect x="130.0" y="270.0" width="100.0" height="11.0" fill="#b91c1c" rx="2" />
  <rect x="130.0" y="282.0" width="72.9" height="11.0" fill="#0f766e" rx="2" />
  <text class="small" x="238.0" y="286.0">cold/warm = 1.7×</text>
  <rect x="20" y="338.0" width="12" height="12" fill="#b91c1c" rx="2" /><text class="small" x="38" y="348.0">cold (first call)</text>
  <rect x="160" y="338.0" width="12" height="12" fill="#0f766e" rx="2" /><text class="small" x="178" y="348.0">warm median</text>
</svg>
